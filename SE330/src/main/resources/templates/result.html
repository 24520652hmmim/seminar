<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registration Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            width: 520px;
            margin: auto;
            background: white;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 0 12px #ccc;
        }

        h2 {
            text-align: center;
            color: #16a34a;
        }

        .message {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 6px;
        }

        .code {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #2563eb;
            margin: 20px 0;
            background: #eff6ff;
            padding: 12px;
            border-radius: 8px;
        }

        .info {
            margin-top: 20px;
            line-height: 1.9;
        }

        .fee {
            font-size: 20px;
            color: #dc2626;
            font-weight: bold;
        }

        a {
            display: block;
            margin-top: 18px;
            text-align: center;
            text-decoration: none;
            color: #2563eb;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Registration Successful</h2>

        <p class="message" th:text="${message}"></p>

        <div class="code">
            Registration Code:
            <span th:text="${student.registrationCode}"></span>
        </div>

        <div class="info">
            <p><b>Name:</b> <span th:text="${student.name}"></span></p>
            <p><b>Email:</b> <span th:text="${student.email}"></span></p>
            <p><b>Student ID:</b> <span th:text="${student.studentId}"></span></p>
            <p><b>Course:</b> <span th:text="${student.course}"></span></p>
            <p><b>Study Mode:</b> <span th:text="${student.studyMode}"></span></p>
            <p><b>Registration Time:</b> <span th:text="${student.registrationTime}"></span></p>
            <p><b>Course Fee:</b> <span class="fee" th:text="${student.fee}"></span> AUD</p>
        </div>

        <a href="/register">Register another student</a>
        <a href="/students">View all registered students</a>
    </div>

</body>

</html>
