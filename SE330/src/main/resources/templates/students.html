<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registered Students</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 35px;
        }

        .container {
            width: 1050px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 12px #ccc;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: #eff6ff;
            padding: 18px;
            border-radius: 10px;
            text-align: center;
        }

        .card h3 {
            margin: 0;
            color: #2563eb;
            font-size: 26px;
        }

        .card p {
            margin: 8px 0 0 0;
            color: #333;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 18px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 11px;
            text-align: center;
            font-size: 14px;
        }

        th {
            background: #2563eb;
            color: white;
        }

        .empty {
            text-align: center;
            color: #666;
            margin-top: 25px;
        }

        .delete-btn {
            background: #dc2626;
            color: white;
            padding: 7px 12px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
        }

        .delete-btn:hover {
            background: #991b1b;
        }

        .back-link {
            display: block;
            margin-top: 25px;
            text-align: center;
            text-decoration: none;
            color: #2563eb;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Registered Students Dashboard</h2>

        <div class="dashboard">
            <div class="card">
                <h3 th:text="${totalStudents}"></h3>
                <p>Total Students</p>
            </div>

            <div class="card">
                <h3 th:text="${onlineStudents}"></h3>
                <p>Online Students</p>
            </div>

            <div class="card">
                <h3 th:text="${offlineStudents}"></h3>
                <p>Offline Students</p>
            </div>

            <div class="card">
                <h3><span th:text="${totalRevenue}"></span></h3>
                <p>Total Revenue AUD</p>
            </div>
        </div>

        <p class="empty" th:if="${students.size() == 0}">
            No students have registered yet.
        </p>

        <table th:if="${students.size() > 0}">
            <tr>
                <th>Code</th>
                <th>Name</th>
                <th>Email</th>
                <th>Student ID</th>
                <th>Course</th>
                <th>Mode</th>
                <th>Fee</th>
                <th>Time</th>
                <th>Action</th>
            </tr>

            <tr th:each="student : ${students}">
                <td th:text="${student.registrationCode}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.studentId}"></td>
                <td th:text="${student.course}"></td>
                <td th:text="${student.studyMode}"></td>
                <td><span th:text="${student.fee}"></span> AUD</td>
                <td th:text="${student.registrationTime}"></td>
                <td>
                    <a class="delete-btn" th:href="@{/students/delete/{id}(id=${student.id})}"
                        onclick="return confirm('Are you sure you want to delete this student?')">
                        Delete
                    </a>
                </td>
            </tr>
        </table>

        <a class="back-link" href="/register">Back to registration form</a>
    </div>

</body>

</html>
