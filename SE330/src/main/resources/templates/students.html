<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registered Students</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            width: 850px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #2563eb;
            color: white;
        }

        .empty {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }

        a {
            display: block;
            margin-top: 25px;
            text-align: center;
            text-decoration: none;
            color: #2563eb;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Registered Students</h2>

        <p class="empty" th:if="${students.size() == 0}">
            No students have registered yet.
        </p>

        <table th:if="${students.size() > 0}">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Student ID</th>
                <th>Course</th>
                <th>Mode</th>
                <th>Fee</th>
            </tr>

            <tr th:each="student : ${students}">
                <td th:text="${student.name}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.studentId}"></td>
                <td th:text="${student.course}"></td>
                <td th:text="${student.studyMode}"></td>
                <td><span th:text="${student.fee}"></span> AUD</td>
            </tr>
        </table>

        <a href="/register">Back to registration form</a>
    </div>

</body>

</html>
